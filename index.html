<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ETA - Player de Canto</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 10px; color: #fff;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            background-image: url('image_6.png'); 
            background-size: cover; background-position: center;
            background-repeat: no-repeat; background-attachment: fixed;
            padding-bottom: 120px; 
        }

        .glass-panel {
            background: rgba(20, 20, 20, 0.85);
            border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }

        .master-player {
            position: sticky; top: 10px; width: 95%; max-width: 600px;
            padding: 15px; z-index: 100; text-align: center; margin-bottom: 10px;
            overflow: auto; resize: vertical; min-height: 45px;
        }

        .player-minimized #yt-player, .player-minimized audio { display: none !important; }
        .player-minimized { resize: none; min-height: 45px; padding-bottom: 10px; }
        
        #now-playing { font-weight: bold; margin-bottom: 8px; font-size: 1em; padding-right: 40px; }
        audio { width: 100%; border-radius: 30px; margin-top: 10px; }
        #yt-player { display: none; width: 100%; aspect-ratio: 16/9; border-radius: 10px; border: none; margin-top: 15px; }

        .toggle-player {
            position: absolute; top: 12px; right: 15px;
            background: rgba(255,255,255,0.1); border: none; color: #fff;
            border-radius: 50%; width: 32px; height: 32px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        .list-selector-container { width: 95%; max-width: 600px; margin-bottom: 10px; display: flex; gap: 5px; }
        #sheet-selector {
            flex: 1; padding: 12px; border-radius: 25px; background: rgba(100, 50, 150, 0.6);
            color: #ff4; border: 1px solid rgba(255, 255, 255, 0.3); font-weight: bold; outline: none;
        }
        .btn-reset-order {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; border-radius: 25px; padding: 0 15px; cursor: pointer; font-size: 0.8em;
        }

        .floating-controls {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%); display: none; 
            gap: 10px; z-index: 1000; width: 90%; max-width: 500px;
        }
        .btn-large {
            flex: 1; padding: 15px 5px; border-radius: 12px; font-weight: bold;
            font-size: 0.9em; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px); color: white; text-transform: uppercase;
        }
        .btn-stop { background: rgba(220, 20, 20, 0.8); }
        .btn-pause { background: rgba(20, 80, 220, 0.8); }
        .btn-reset { background: rgba(200, 160, 20, 0.8); color: #000; }

        .search-container { width: 95%; max-width: 600px; margin-bottom: 20px; position: relative; }
        #search-input {
            width: 100%; padding: 12px 45px 12px 20px; border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.1);
            color: #fff; font-size: 1em; outline: none; box-sizing: border-box;
        }
        .clear-search {
            position: absolute; right: 12px; top: 7px; background: rgba(255, 255, 255, 0.2);
            border: none; color: #ff4; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; display: none;
        }

        ul { list-style: none; padding: 0; width: 95%; max-width: 700px; min-height: 50px; }
        li { margin: 12px 0; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        li.is-separator { background: rgba(100, 50, 150, 0.6) !important; border: 1px solid rgba(255, 255, 255, 0.5); }
        .separator-content { display: grid; grid-template-columns: 35px 1fr; align-items: center; }
        .separator-title { font-size: 1.2em; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; text-align: center; width: 100%; color: #ff4; }

        .li-main-row { display: grid; grid-template-columns: 35px 35px 1fr 50px; align-items: center; gap: 10px; }
        .drag-handle { cursor: grab; color: rgba(255,255,255,0.4); font-size: 22px; }
        .song-info { display: flex; flex-direction: column; overflow: hidden; }
        .interpreter { color: #ff4; font-weight: bold; font-size: 1.03em; text-transform: uppercase; }
        .song-title { font-size: 1.01em; color: #fff; }
        .btn-play {
            background: rgba(255, 255, 255, 0.1); color: #ff4; border: none;
            border-radius: 50%; width: 48px; height: 48px; cursor: pointer; font-size: 1.3em;
            display: flex; align-items: center; justify-content: center;
        }
        .done { opacity: 0.3; filter: grayscale(100%); }
        .notes-field {
            background: rgba(255, 255, 255, 0.05); border: 1px dashed rgba(255, 255, 255, 0.2);
            color: #ccc; font-size: 0.9em; padding: 8px; border-radius: 8px; outline: none;
        }
    </style>
</head>
<body>

    <div id="main-player-container" class="master-player glass-panel player-minimized">
        <button class="toggle-player" id="btn-toggle" onclick="togglePlayer()">▼</button>
        <div id="now-playing">Selecione uma faixa</div>
        <audio id="audio-player" controls></audio>
        <iframe id="yt-player" allow="autoplay"></iframe>
    </div>

    <div class="list-selector-container">
        <select id="sheet-selector" onchange="mudarLista(this.value)">
            <option value="1960210650">📅 DOMINGO</option>
            <option value="1517164028">📅 SEGUNDA-FEIRA</option>
            <option value="216102701">📅 TERÇA-FEIRA</option>
            <option value="911593347">📅 QUARTA-FEIRA</option>
            <option value="1593190716">📅 QUINTA-FEIRA</option>
        </select>
        <button class="btn-reset-order" onclick="resetarOrdemLocal()">Resetar Ordem</button>
    </div>

    <div id="float-ctrl" class="floating-controls">
        <button class="btn-large btn-reset" onclick="restartMedia()">↺ Início</button>
        <button id="btn-pause-float" class="btn-large btn-pause" onclick="pauseMedia()">⏸ Pausar</button>
        <button class="btn-large btn-stop" onclick="stopAll()">■ Stop</button>
    </div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="🔍 Buscar na lista..." oninput="filtrarLista()">
        <button class="clear-search" id="btn-clear" onclick="limparBusca()">✕</button>
    </div>

    <ul id="playlist-sortable"></ul>

    <script>
        const BASE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSUwdgFWo3-RvINecYfmj0aMZBEKTeGjMkUoJrq-QvwzFTzKRU3XiMCQkDgxsNRtxMha2bTeirKvD8N/pub?output=csv';
        let GID_ATUAL = '1960210650';

        // --- LÓGICA DE PERSISTÊNCIA (LOCALSTORAGE) ---
        function salvarEstadoLocal() {
            const itens = [];
            document.querySelectorAll('#playlist-sortable li').forEach(li => {
                itens.push({
                    id: li.dataset.id,
                    done: li.querySelector('.chk-done')?.checked || false
                });
            });
            localStorage.setItem('ordem_' + GID_ATUAL, JSON.stringify(itens));
        }

        function resetarOrdemLocal() {
            if(confirm("Deseja voltar para a ordem original da planilha?")) {
                localStorage.removeItem('ordem_' + GID_ATUAL);
                carregar();
            }
        }

        // --- FUNÇÕES DO PLAYER ---
        function mudarLista(novoGid) {
            GID_ATUAL = novoGid;
            carregar();
        }

        function togglePlayer() {
            const container = document.getElementById('main-player-container');
            const btn = document.getElementById('btn-toggle');
            const isMin = container.classList.toggle('player-minimized');
            btn.innerText = isMin ? '▼' : '✕';
        }

        function stopAll() {
            const audio = document.getElementById('audio-player');
            const yt = document.getElementById('yt-player');
            document.getElementById('float-ctrl').style.display = 'none';
            audio.pause(); audio.src = ""; yt.src = "";
            audio.style.display = 'none'; yt.style.display = 'none';
            document.getElementById('now-playing').innerText = "Parado";
        }

        function pauseMedia() {
            const audio = document.getElementById('audio-player');
            const btn = document.getElementById('btn-pause-float');
            if (audio.style.display !== 'none') {
                if (audio.paused) { audio.play(); btn.innerText = "⏸ Pausar"; }
                else { audio.pause(); btn.innerText = "▶ Play"; }
            }
        }

        function restartMedia() {
            const audio = document.getElementById('audio-player');
            const yt = document.getElementById('yt-player');
            if (audio.style.display !== 'none') {
                audio.currentTime = 0; audio.play();
                document.getElementById('btn-pause-float').innerText = "⏸ Pausar";
            } else if (yt.style.display !== 'none') {
                const oldSrc = yt.src; yt.src = ""; yt.src = oldSrc;
            }
        }

        function filtrarLista() {
            const input = document.getElementById('search-input');
            const termo = input.value.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
            document.getElementById('btn-clear').style.display = input.value ? "block" : "none";
            document.querySelectorAll('#playlist-sortable li').forEach(li => {
                if (li.classList.contains('is-separator')) {
                    li.style.display = termo === "" ? "flex" : "none";
                } else {
                    const txt = li.innerText.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                    li.style.display = txt.includes(termo) ? "flex" : "none";
                }
            });
        }

        function limparBusca() {
            document.getElementById('search-input').value = '';
            filtrarLista();
        }

        async function carregar() {
            const lista = document.getElementById('playlist-sortable');
            lista.innerHTML = '<p style="text-align:center;">Carregando...</p>';
            
            try {
                const r = await fetch(`${BASE_URL}&gid=${GID_ATUAL}&t=${new Date().getTime()}`);
                const texto = await r.text();
                const linhas = texto.split('\n').map(l => l.trim()).filter(l => l);
                
                let dadosMap = {};
                linhas.slice(1).forEach((linha, index) => {
                    const cols = linha.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const id = cols[0]?.replace(/"/g, '') || ('item-'+index);
                    dadosMap[id] = {
                        id: id,
                        cantor: cols[1]?.replace(/"/g, '') || '',
                        musica: cols[2]?.replace(/"/g, '') || '',
                        media: cols[3]?.replace(/"/g, '').trim() || '',
                        tipo: (cols[4]?.replace(/"/g, '') || '').toLowerCase().trim(),
                        notas: cols[5]?.replace(/"/g, '') || ''
                    };
                });

                // Recuperar ordem salva
                const salva = localStorage.getItem('ordem_' + GID_ATUAL);
                let idsOrdenados = Object.keys(dadosMap);
                let estadosCheck = {};

                if (salva) {
                    const objSalvo = JSON.parse(salva);
                    // Filtra apenas IDs que ainda existem na planilha
                    idsOrdenados = objSalvo.map(s => s.id).filter(id => dadosMap[id]);
                    // Adiciona IDs novos que não estavam no salvo
                    Object.keys(dadosMap).forEach(id => {
                        if (!idsOrdenados.includes(id)) idsOrdenados.push(id);
                    });
                    objSalvo.forEach(s => estadosCheck[s.id] = s.done);
                }

                lista.innerHTML = '';
                idsOrdenados.forEach(id => {
                    const item = dadosMap[id];
                    if (!item.musica) return;

                    const li = document.createElement('li');
                    li.className = 'glass-panel';
                    li.dataset.id = item.id;
                    
                    if (item.tipo === 'separador') {
                        li.classList.add('is-separator');
                        li.innerHTML = `<div class="separator-content"><div class="drag-handle">⋮⋮</div><div class="separator-title">${item.musica}</div></div>`;
                    } else {
                        const temMidia = item.media && item.media.length > 5;
                        const isDone = estadosCheck[item.id] || false;
                        if(isDone) li.classList.add('done');

                        li.innerHTML = `
                            <div class="li-main-row">
                                <div class="drag-handle">⋮⋮</div>
                                <input type="checkbox" class="chk-done" ${isDone ? 'checked' : ''} onchange="this.closest('li').classList.toggle('done'); salvarEstadoLocal();">
                                <div class="song-info">
                                    <span class="interpreter">${item.cantor}</span>
                                    <span class="song-title">${item.musica}</span>
                                </div>
                                ${temMidia ? `<button class="btn-play" onclick="tocar('${item.tipo}', '${item.media}', '${item.cantor}', '${item.musica}')">▶</button>` : '<div></div>'}
                            </div>
                            <div class="notes-field" contenteditable="true">${item.notas}</div>
                        `;
                    }
                    lista.appendChild(li);
                });

                Sortable.create(lista, { 
                    handle: '.drag-handle', 
                    animation: 150,
                    onEnd: salvarEstadoLocal 
                });

            } catch (e) { 
                console.error(e);
                lista.innerHTML = '<p style="text-align:center;">Erro ao carregar.</p>';
            }
        }

        function tocar(tipo, media, cantor, musica) {
            const audio = document.getElementById('audio-player');
            const yt = document.getElementById('yt-player');
            const floatPauseBtn = document.getElementById('btn-pause-float');
            const container = document.getElementById('main-player-container');
            
            container.classList.remove('player-minimized');
            document.getElementById('btn-toggle').innerText = '✕';
            document.getElementById('float-ctrl').style.display = 'flex';
            floatPauseBtn.innerText = "⏸ Pausar";
            document.getElementById('now-playing').innerHTML = `Tocando: <b>${musica}</b><br><small>${cantor}</small>`;
            
            audio.pause(); audio.src = ""; yt.src = "";
            audio.style.display = 'none'; yt.style.display = 'none';
            
            const ehYouTube = media.includes('youtube.com') || media.includes('youtu.be') || media.length === 11;
            
            if (ehYouTube) {
                yt.style.display = 'block';
                floatPauseBtn.style.display = 'none';
                let id = media.includes('v=') ? media.split('v=')[1].split('&')[0] : (media.includes('be/') ? media.split('be/')[1] : media);
                yt.src = `https://www.youtube.com/embed/${id}?autoplay=1`;
            } else {
                audio.style.display = 'block';
                floatPauseBtn.style.display = 'flex';
                let url = media;
                if (url.includes('dropbox.com')) url = url.replace('www.dropbox.com', 'dl.dropboxusercontent.com').replace('?dl=0', '');
                else if (!url.includes('http')) url = `https://docs.google.com/uc?export=open&id=${url}`;
                audio.src = url; audio.load(); audio.play();
            }
        }
        window.addEventListener('DOMContentLoaded', carregar);
    </script>
</body>
</html>
